<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Dokumen Pro - PT Makanpisang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            color: #1e293b;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Container Kamera */
        .camera-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1/1;
            overflow: hidden;
            border-radius: 40px;
            background: #1e293b;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        }

        #reader {
            width: 100% !important;
            height: 100% !important;
        }

        #reader video {
            object-fit: cover !important;
        }

        /* Garis Scan Animasi */
        .scan-line {
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, transparent, #3b82f6, transparent);
            position: absolute;
            top: 0;
            z-index: 30;
            animation: scanAnim 3s infinite ease-in-out;
            box-shadow: 0 0 15px #3b82f6;
        }

        @keyframes scanAnim {
            0% { top: 10%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 90%; opacity: 0; }
        }

        .glass-btn {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <header class="p-6 flex items-center justify-between">
        <div class="flex items-center space-x-3">
            <div class="bg-blue-600 p-2.5 rounded-2xl shadow-lg shadow-blue-200">
                <i class="fas fa-shield-halved text-white"></i>
            </div>
            <div>
                <h1 class="text-xl font-extrabold text-slate-900 leading-none">DOKUMEN <span class="text-blue-600">PRO</span></h1>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Scanner Verified</p>
            </div>
        </div>
        <button onclick="location.reload()" class="w-11 h-11 rounded-2xl glass-btn flex items-center justify-center shadow-sm">
            <i class="fas fa-sync-alt text-slate-600"></i>
        </button>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-6 space-y-8">
        
        <div class="camera-wrapper">
            <div id="reader"></div>

            <div id="scanner-ui" class="absolute inset-0 z-20 flex items-center justify-center pointer-events-none">
                <div class="w-64 h-64 relative">
                    <div class="absolute top-0 left-0 w-12 h-12 border-t-4 border-l-4 border-blue-600 rounded-tl-3xl"></div>
                    <div class="absolute top-0 right-0 w-12 h-12 border-t-4 border-r-4 border-blue-600 rounded-tr-3xl"></div>
                    <div class="absolute bottom-0 left-0 w-12 h-12 border-b-4 border-l-4 border-blue-600 rounded-bl-3xl"></div>
                    <div class="absolute bottom-0 right-0 w-12 h-12 border-b-4 border-r-4 border-blue-600 rounded-br-3xl"></div>
                    <div class="scan-line"></div>
                </div>
            </div>

            <div id="setup-ui" class="absolute inset-0 z-40 bg-slate-900/80 flex flex-col items-center justify-center p-10 text-center">
                <div class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center mb-4 animate-bounce">
                    <i class="fas fa-camera text-white text-2xl"></i>
                </div>
                <h3 class="text-white font-bold text-lg mb-2">Akses Kamera</h3>
                <p class="text-slate-300 text-sm mb-6">Izinkan akses kamera untuk mulai memverifikasi dokumen Anda.</p>
                <button id="start-btn" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold shadow-xl active:scale-95 transition-transform">
                    Buka Kamera
                </button>
            </div>
        </div>

        <div class="text-center">
            <p class="text-slate-400 text-xs font-bold uppercase tracking-[0.3em]">Status: <span id="status-text" class="text-red-500">Standby</span></p>
        </div>

    </main>

    <div id="loading-overlay" class="fixed inset-0 bg-white/95 backdrop-blur-md z-[100] hidden flex flex-col items-center justify-center">
        <div class="w-14 h-14 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-6"></div>
        <p class="text-blue-600 font-black tracking-widest text-lg">MEMVERIFIKASI...</p>
    </div>

    <footer class="p-8 text-center">
        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">© 2026 PT Makanpisang Security</p>
    </footer>

    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const startBtn = document.getElementById('start-btn');
        const setupUI = document.getElementById('setup-ui');
        const statusText = document.getElementById('status-text');
        const loadingOverlay = document.getElementById('loading-overlay');

        const qrConfig = { 
            fps: 20, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0 
        };

        const onScanSuccess = (decodedText, decodedResult) => {
            if (navigator.vibrate) navigator.vibrate(150);
            
            // Hentikan kamera
            html5QrCode.stop().then(() => {
                loadingOverlay.classList.remove('hidden');
                let targetUrl = "https://dokumen-penting.vercel.app/?link=" + encodeURIComponent(decodedText);
                
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 1000);
            });
        };

        const startCamera = () => {
            // Meminta izin kamera
            html5QrCode.start(
                { facingMode: "environment" }, 
                qrConfig, 
                onScanSuccess
            )
            .then(() => {
                setupUI.classList.add('hidden');
                statusText.innerText = "ACTIVE";
                statusText.className = "text-green-500";
            })
            .catch((err) => {
                alert("Gagal mengakses kamera: " + err);
                console.error(err);
            });
        };

        startBtn.addEventListener('click', startCamera);

        // Auto-start jika sudah pernah memberi izin sebelumnya
        navigator.permissions.query({ name: 'camera' }).then((result) => {
            if (result.state === 'granted') {
                startCamera();
            }
        });
    </script>
</body>
</html>
